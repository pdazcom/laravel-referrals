name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^9.52.18'
            testbench: '^7.48'
          - php: '8.2'
            laravel: '^10'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '^11'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^11'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^12'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12'
            testbench: '^10.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Allow insecure audit resolution for Laravel 9 matrix
        if: matrix.laravel == '^9.52.18'
        run: composer config audit.block-insecure false

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
